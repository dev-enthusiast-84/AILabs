<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Agentic RAG — Enterprise Document Q&A powered by LangGraph, FastAPI, ChromaDB/Pinecone and OpenAI" />
  <title>Agentic RAG Docs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <style>
    /* ── Oat colour palette ─────────────────────────────── */
    :root {
      --theme-color: #8B6914;
      --sidebar-width: 280px;
      --base-font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --mono-font-family: 'JetBrains Mono', 'Fira Code', monospace;
      /* Cover: dark warm-oat gradient so white text is always readable */
      --cover-color: #FAF6EE;
      --cover-background-color: linear-gradient(135deg, #2C1A08 0%, #5C3D1E 50%, #8B6914 100%);
      --heading-color: #3D2B10;
      --sidebar-background: #F0E6D0;
      --sidebar-nav-link-color: #5C3D1E;
      --sidebar-nav-link-font-size: 13.5px;
      --sidebar-nav-link-font-weight: 500;
      --sidebar-nav-link-font-weight--active: 700;
      --sidebar-nav-link-color--active: #8B6914;
      --sidebar-nav-link-border-color--active: #8B6914;
    }

    /* Oat page background */
    body { background: #FAF6EE; }

    /* Guarantee cover page uses the oat gradient (overrides theme resets) */
    section.cover {
      background: linear-gradient(135deg, #2C1A08 0%, #5C3D1E 50%, #8B6914 100%) !important;
    }
    section.cover .cover-main { color: #FAF6EE !important; }
    section.cover blockquote p { color: #F2E8D0 !important; opacity: 1 !important; }

    /* Section group headers in sidebar */
    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > strong {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C4A46B;
      padding: 14px 16px 4px;
      margin: 0;
    }

    /* Sidebar nav items indented */
    .sidebar-nav > ul > li > ul > li > a {
      padding-left: 20px;
    }

    /* Active page highlight with left border */
    .sidebar-nav ul li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      border-right: 3px solid var(--theme-color);
    }

    /* Divider between sidebar sections */
    .sidebar-nav > ul > li + li > p {
      border-top: 1px solid #DDD0B0;
      margin-top: 8px;
    }

    /* Better code blocks */
    .markdown-section pre > code {
      font-family: var(--mono-font-family);
      font-size: 13.5px;
      line-height: 1.65;
      border-radius: 6px;
    }

    /* Inline code */
    .markdown-section code:not(pre code) {
      font-family: var(--mono-font-family);
      font-size: 0.875em;
      background: #EDE0C4;
      padding: 2px 5px;
      border-radius: 4px;
      color: #3D2B10;
    }

    /* Table improvements */
    .markdown-section table {
      width: 100%;
      margin: 1rem 0;
      border-collapse: collapse;
      font-size: 14px;
    }
    .markdown-section table th {
      background: #EDE0C4;
      font-weight: 600;
      text-align: left;
      padding: 8px 12px;
      color: #3D2B10;
    }
    .markdown-section table td {
      padding: 7px 12px;
      border-bottom: 1px solid #DDD0B0;
    }
    .markdown-section table tr:last-child td {
      border-bottom: none;
    }

    /* Section heading separator */
    .markdown-section h2 {
      padding-top: 1em;
      border-bottom: 2px solid #DDD0B0;
      padding-bottom: 0.3em;
    }

    /* Cover page buttons */
    .cover-main .anchor { display: none; }
    .cover-main a[data-v] { border-radius: 6px; }

    /* Search */
    .search .input-wrap input {
      font-family: var(--base-font-family);
      font-size: 14px;
    }

    /* ── Link styling: gradient underline, no default blue underline ── */
    .markdown-section a {
      color: #8B6914;
      text-decoration: none;
      background-image: linear-gradient(90deg, #8B6914, #C4853A);
      background-repeat: no-repeat;
      background-size: 0% 1.5px;
      background-position: left bottom;
      transition: background-size 0.22s ease, color 0.18s;
      padding-bottom: 1px;
    }
    .markdown-section a:hover {
      color: #C4853A;
      background-size: 100% 1.5px;
    }

    /* ── Sidebar nav: tab-style active indicator ── */
    .sidebar-nav ul li > a {
      position: relative;
      padding-left: 16px;
      transition: color 0.15s, padding-left 0.15s;
    }
    .sidebar-nav ul li > a::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 3px;
      height: 60%;
      border-radius: 0 2px 2px 0;
      background: linear-gradient(180deg, #8B6914, #C4853A);
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), opacity 0.15s;
      opacity: 0;
    }
    .sidebar-nav ul li.active > a::before,
    .sidebar-nav ul li > a:hover::before {
      transform: translateY(-50%) scaleY(1);
      opacity: 1;
    }
    .sidebar-nav ul li > a:hover {
      padding-left: 22px;
      color: #8B6914;
    }

    /* ── Pagination nav: gradient button style ── */
    .pagination-item a {
      border: 1px solid #DDD0B0 !important;
      border-radius: 6px !important;
      color: #5C3D1E !important;
      text-decoration: none !important;
      transition: background 0.18s, border-color 0.18s !important;
    }
    .pagination-item a:hover {
      background: linear-gradient(135deg, rgba(139,105,20,.12), rgba(196,133,58,.06)) !important;
      border-color: #8B6914 !important;
      color: #8B6914 !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🤖 Agentic RAG',
      repo: '',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      homepage: 'README.md',
      relativePath: false,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation…',
        noData: 'No results found.',
        depth: 4,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: '✓ Copied',
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
