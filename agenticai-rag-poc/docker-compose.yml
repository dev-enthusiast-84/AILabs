version: '3.9'

services:
  clamav:
    image: clamav/clamav:stable
    container_name: clamav
    # Port 3310 is only reachable inside the Docker network — not mapped to host
    expose:
      - "3310"
    healthcheck:
      test: ["CMD", "clamdscan", "--ping"]
      interval: 60s
      timeout: 30s
      retries: 5
      # ClamAV runs freshclam on first start to download virus definitions (~300 MB);
      # allow extra time before declaring it unhealthy.
      start_period: 120s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    volumes:
      - chroma_data:/app/chroma_db
      - ./sample-data:/app/sample-data:ro
    ports:
      - "8000:8000"
    depends_on:
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
