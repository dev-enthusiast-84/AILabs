name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'agenticai-rag-poc/docs/**'
      - 'agenticai-rag-poc/README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate docs/README.md from root README
        run: sed 's|](docs/|](|g' agenticai-rag-poc/README.md > agenticai-rag-poc/docs/README.md

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: agenticai-rag-poc/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
